  <style>
    :root {
      --week-header-height: 52px;
      --week-header-bg: #0f172a;
      --week-header-fg: #f8fafc;
      --footer-fg: #475569;
    }

    body {
      margin-top: var(--week-header-height);
    }

    #week-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--week-header-height);
      background: var(--week-header-bg);
      color: var(--week-header-fg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      letter-spacing: 0.2px;
      z-index: 9999;
      padding: 0 16px;
      text-align: center;
    }

    .content {
      padding-bottom: 60px;
    }

    .custom-footer {
      margin-top: 24px;
      padding-top: 14px;

<body>
  <div id="app"></div>
  <div id="week-header">Course Overview and Weekly Index</div>

  <script>
    window.$docsify = {
      name: "NPTEL Data Analytics with Python",
      repo: "",
      loadSidebar: true,
      subMaxLevel: 2,
      homepage: "README.md",
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: "auto",
        placeholder: "Search notes",
        noData: "No results"
      },
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === "math") {
              return "$$" + code + "$$";
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },
      plugins: [
        function (hook) {
          var weekTitles = {
            "#/README": "Course Overview and Weekly Index",
            "#/week_1_formatted": "Week 1: Analytics and Foundations",
            "#/week_2_formatted": "Week 2: Probability and Distributions",
            "#/week_3_formatted": "Week 3: Sampling and Confidence Intervals",
            "#/week_4_formatted": "Week 4: Hypothesis Testing Essentials",
            "#/week_5_formatted": "Week 5: ANOVA and Two-Sample Testing",
            "#/week_6_formatted": "Week 6: ANOVA and Simple Regression",
            "#/week_7_formatted": "Week 7: Diagnostics and Multiple Regression",
            "#/week_8_formatted": "Week 8: MLE and Logistic Regression",
            "#/week_9_formatted": "Week 9: ROC and Model Building",
            "#/week_10_formatted": "Week 10: Chi-Square and Clustering Intro",
            "#/week_11_formatted": "Week 11: Distance Metrics and Clustering",
            "#/week_12_formatted": "Week 12: HAC and CART Trees"
          };

          hook.doneEach(function () {
            var rawRoute = window.location.hash || "#/README";
            var route = rawRoute.split("?")[0];
            var header = document.getElementById("week-header");
            if (header) {
              header.textContent = weekTitles[route] || "NPTEL Data Analytics with Python";
            }

            var content = document.querySelector(".content");
            if (content && !content.querySelector(".custom-footer")) {
              var footer = document.createElement("div");
              footer.className = "custom-footer";
              footer.innerHTML = 'Made with fear by <a href="https://github.com/skndash96/nptel-data-analytics-with-python" target="_blank" rel="noopener">skndash96</a>';
              content.appendChild(footer);
            }
          });
        }
      ]
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
